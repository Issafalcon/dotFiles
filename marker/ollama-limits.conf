# Ollama systemd resource limits
# Installed by ~/dotFiles/marker/install.sh
# Prevents Ollama from consuming all RAM and freezing the system.

[Service]
# Hard memory cap - OOM-kill Ollama before the OS freezes.
# Adjust if you run larger models (e.g. MemoryMax=8G for 7B+ models).
MemoryMax=4G
MemoryHigh=3G

# Only keep one model loaded at a time; unload after 10 minutes idle.
Environment="OLLAMA_MAX_LOADED_MODELS=1"
Environment="OLLAMA_NUM_PARALLEL=1"
Environment="OLLAMA_KEEP_ALIVE=10m"
